name: Build and Publish Release

on:
    push:
        branches:
            - master

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Verify build output
              run: |
                  if [ ! -d "public" ]; then
                    echo "public directory does not exist"
                    exit 1
                  fi

            - name: Create zip archive
              run: |
                  cd public
                  zip -r ../public.zip . -x "*.DS_Store"
                  cd ..
                  if [ ! -s "public.zip" ]; then
                    echo "Archive is empty"
                    exit 1
                  fi

            - name: Delete old release if exists
              run: |
                  gh release delete latest-build -y || true
                  git push --delete origin latest-build || true
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest-build
                  name: Latest build
                  draft: false
                  prerelease: false
                  make_latest: true
                  files: public.zip
